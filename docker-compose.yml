services:
  frontend:
    image: eren-isik-lab-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    read_only: true
    expose:
      - "3000"
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    environment:
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 200
    stop_grace_period: 20s
    networks:
      - edge

  cloudflared:
    image: cloudflare/cloudflared:2026.6.0@sha256:ba461b8aa9c042156dbd39c38657fe7431bafa063220eab8d5330a523863da9f
    init: true
    restart: unless-stopped
    read_only: true
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN:?Set TUNNEL_TOKEN in .env}
    depends_on:
      frontend:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 100
    stop_grace_period: 20s
    networks:
      - edge

networks:
  edge:
    driver: bridge
